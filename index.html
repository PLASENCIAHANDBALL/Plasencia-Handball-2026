<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plasencia Handball 2026</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c4161c">
</head>

<body>

  <div id="splash">

  <!-- 1️⃣ LOGO (centrado) -->
  <img src="img/logo-torneo.png" alt="Plasencia Handball">

  <!-- 2️⃣ TEXTO + BARRA (abajo) -->
  <div class="splash-content">
    <div class="splash-texto">Cargando…</div>

    <div class="splash-barra">
      <div id="splash-progreso"></div>
    </div>
  </div>

</div>

  <!-- HEADER + NAV -->
<div class="header-wrapper">
  <header class="app-header"></header>

  <nav class="nav-principal">
  <button data-view="inicio" onclick="mostrarHome()">🤾🏻‍♂️<span>Inicio</span></button>
  <button data-view="partidos" onclick="mostrarPartidos()">🥅<span>Partidos</span></button>
  <button data-view="categorias" onclick="mostrarCategorias()">📋<span>Categorías</span></button>
  <button data-view="clubs" onclick="mostrarEquipos()">🤝🏼<span>Clubs</span></button>
  <button data-view="tabla" onclick="mostrarClasificacion()">🏆<span>Tabla</span></button>
  <button data-view="pabellones" onclick="mostrarPabellones()">🏘️<span>Pabellones</span></button>
</nav>
</div>

  <main>
    <section id="contenido"></section>
  </main>

  <footer class="app-footer">
  <div class="footer-email">
    ✉️ extremactive.deporte@gmail.com
  </div>

  <div class="footer-copy">
    © 2026 · Torneo Internacional Plasencia Handball
  </div>
</footer>
  
  <!-- BOTÓN REDES SOCIALES -->
  <div class="social-fab">
    <button class="social-main" onclick="toggleSocial()">
      <img src="img/redes.png" alt="Redes">
    </button>

    <div class="social-menu">
      <a href="https://instagram.com/plasenciahandball" target="_blank" class="social-btn">
        <img src="img/instagram.png" alt="Instagram">
        <span>Instagram</span>
      </a>

      <a href="https://www.facebook.com/plasenciahandball/?locale=es_ES" target="_blank" class="social-btn">
        <img src="img/facebook.png" alt="Facebook">
        <span>Facebook</span>
      </a>

      <a href="https://swltv.es/prohandballplasencia/" target="_blank" class="social-btn">
        <img src="img/twitch.png" alt="Twitch">
        <span>Twitch</span>
      </a>
    </div>
  </div>

  <!-- BOTÓN ADMIN -->
  <button id="admin-fab" onclick="toggleAdmin()">🔒</button>

  <!-- APP -->
  <script type="module" src="js/app.js"></script>

  <!-- SOCIAL TOGGLE -->
  <script>
    function toggleSocial() {
      document.querySelector('.social-fab')?.classList.toggle('open');
    }
  </script>

</body>
</html>
